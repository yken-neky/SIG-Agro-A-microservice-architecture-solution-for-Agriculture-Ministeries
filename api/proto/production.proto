syntax = "proto3";

package production;

option go_package = "./production;production";

service ProductionService {
  rpc RecordActivity(RecordActivityRequest) returns (RecordActivityResponse);
  rpc GetActivity(GetActivityRequest) returns (GetActivityResponse);
  rpc ListActivities(ListActivitiesRequest) returns (ListActivitiesResponse);
}

message RecordActivityRequest {
  int64 parcel_id = 1;
  string activity_type = 2;
  string description = 3;
  int64 timestamp = 4;
  map<string, string> metadata = 5;
}

message RecordActivityResponse {
  int64 activity_id = 1;
  string message = 2;
}

message GetActivityRequest {
  int64 activity_id = 1;
}

message GetActivityResponse {
  int64 activity_id = 1;
  int64 parcel_id = 2;
  string activity_type = 3;
  string description = 4;
  int64 timestamp = 5;
}

message ListActivitiesRequest {
  int64 parcel_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListActivitiesResponse {
  repeated GetActivityResponse activities = 1;
  int32 total = 2;
}
