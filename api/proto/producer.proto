syntax = "proto3";

package producer;

option go_package = "./producer;producer";

service ProducerService {
  rpc CreateProducer(CreateProducerRequest) returns (CreateProducerResponse);
  rpc GetProducer(GetProducerRequest) returns (GetProducerResponse);
  rpc ListProducers(ListProducersRequest) returns (ListProducersResponse);
  rpc UpdateProducer(UpdateProducerRequest) returns (UpdateProducerResponse);
  rpc DeleteProducer(DeleteProducerRequest) returns (DeleteProducerResponse);
}

message CreateProducerRequest {
  int64 user_id = 1;
  string name = 2;
  string document_id = 3;
  string phone = 4;
  string email = 5;
  string address = 6;
}

message CreateProducerResponse {
  int64 producer_id = 1;
  string name = 2;
  string message = 3;
}

message GetProducerRequest {
  int64 producer_id = 1;
}

message GetProducerResponse {
  int64 producer_id = 1;
  int64 user_id = 2;
  string name = 3;
  string document_id = 4;
  string phone = 5;
  string email = 6;
  string address = 7;
  int64 created_at = 8;
}

message ListProducersRequest {
  int64 user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListProducersResponse {
  repeated GetProducerResponse producers = 1;
  int32 total = 2;
}

message UpdateProducerRequest {
  int64 producer_id = 1;
  string name = 2;
  string phone = 3;
  string email = 4;
  string address = 5;
}

message UpdateProducerResponse {
  int64 producer_id = 1;
  string message = 2;
}

message DeleteProducerRequest {
  int64 producer_id = 1;
}

message DeleteProducerResponse {
  bool success = 1;
  string message = 2;
}
