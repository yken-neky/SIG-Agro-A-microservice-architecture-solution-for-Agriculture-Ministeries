version: "2"
sql:
  - engine: "postgresql"
    queries: "./db/queries/alerts.sql"
    schema: "./db/migrations/001_create_alerts_table.sql"
    gen:
      go:
        out: "./internal/repository/sqlc"
        package: "sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
