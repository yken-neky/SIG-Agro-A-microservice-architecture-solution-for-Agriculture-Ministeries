# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build Alert Service
      run: go build -v ./services/alert-service/...

    - name: Build Notification Service
      run: go build -v ./services/notification-service/...

    - name: Build Parcel Service
      run: go build -v ./services/parcel-service/...

    - name: Build Producer Service
      run: go build -v ./services/producer-service/...

    - name: Build Production Service
      run: go build -v ./services/production-service/...

    - name: Build Report Service
      run: go build -v ./services/report-service/...

    - name: Build User Service
      run: go build -v ./services/user-service/...

    
